server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://localhost:5432/product_inventory
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

jwt:
  secret: product-inventory-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256
  access-token-expiration-ms: 3600000  # 1 hour

barcode:
  open-food-facts:
    base-url: https://world.openfoodfacts.org
  gs1:
    base-url: ${GS1_BASE_URL:}

gigachat:
  base-url: ${GIGACHAT_BASE_URL:https://gigachat.devices.sberbank.ru/api/v1}
  api-key: ${GIGACHAT_API_KEY:}
  oauth-url: ${GIGACHAT_OAUTH_URL:https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
  scope: ${GIGACHAT_SCOPE:GIGACHAT_API_PERS}

firebase:
  project-id: ${FIREBASE_PROJECT_ID:}
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
