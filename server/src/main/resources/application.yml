server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/product_inventory
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

jwt:
  secret: product-inventory-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256
  access-token-expiration-ms: 3600000  # 1 hour

barcode:
  open-food-facts:
    base-url: https://world.openfoodfacts.org
  gs1:
    base-url: ${GS1_BASE_URL:}

gigachat:
  base-url: ${GIGACHAT_BASE_URL:}
  api-key: ${GIGACHAT_API_KEY:}
