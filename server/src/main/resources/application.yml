server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  datasource:
    url: ${POSTGRES_JDBC_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 3600000  # 1 hour

barcode:
  open-food-facts:
    base-url: https://world.openfoodfacts.org
  gs1:
    base-url: ${GS1_BASE_URL:}

product-images:
  s3:
    endpoint: ${PRODUCT_IMAGES_S3_ENDPOINT:}
    access-key: ${PRODUCT_IMAGES_S3_ACCESS_KEY:}
    secret-key: ${PRODUCT_IMAGES_S3_SECRET_KEY:}
    bucket: ${PRODUCT_IMAGES_S3_BUCKET:product-images}
    public-base-url: ${PRODUCT_IMAGES_PUBLIC_BASE_URL:}
    presigned-expiry-days: ${PRODUCT_IMAGES_PRESIGNED_EXPIRY_DAYS:7}

gigachat:
  base-url: ${GIGACHAT_BASE_URL:https://gigachat.devices.sberbank.ru/api/v1}
  api-key: ${GIGACHAT_API_KEY:${GIGA_CHAT_API:${GIGACHAT_API:}}}
  oauth-url: ${GIGACHAT_OAUTH_URL:https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
  scope: ${GIGACHAT_SCOPE:GIGACHAT_API_PERS}

local-recipes:
  enabled: ${LOCAL_RECIPES_ENABLED:false}

external-recipes:
  povar:
    enabled: ${POVAR_RECIPES_ENABLED:true}
    base-url: ${POVAR_RECIPES_BASE_URL:https://povar.ru}
    max-products: ${POVAR_RECIPES_MAX_PRODUCTS:2}
    max-recipes: ${POVAR_RECIPES_MAX_RECIPES:3}
  themealdb:
    enabled: ${THEMEALDB_RECIPES_ENABLED:true}
    base-url: ${THEMEALDB_RECIPES_BASE_URL:https://www.themealdb.com/api/json/v1/1}
    max-products: ${THEMEALDB_RECIPES_MAX_PRODUCTS:3}
    max-recipes: ${THEMEALDB_RECIPES_MAX_RECIPES:4}

firebase:
  project-id: ${FIREBASE_PROJECT_ID:}
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
